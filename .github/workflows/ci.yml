name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.1"

      - name: Set up Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Set up JDT LS
        shell: pwsh
        run: |
          $installDir = Join-Path $env:RUNNER_TEMP "jdtls"
          $archive = Join-Path $env:RUNNER_TEMP "jdtls.tar.gz"
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null
          Invoke-WebRequest "https://download.eclipse.org/jdtls/snapshots/jdt-language-server-latest.tar.gz" -OutFile $archive
          tar -xzf $archive -C $installDir
          $launcher = Get-ChildItem -LiteralPath (Join-Path $installDir "plugins") -Filter "org.eclipse.equinox.launcher_*.jar" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $launcher) { throw "JDT LS launcher not found" }
          $configDir = if ("${{ runner.os }}" -eq "Windows") { "config_win" } elseif ("${{ runner.os }}" -eq "macOS") { "config_mac" } else { "config_linux" }
          if ("${{ runner.os }}" -eq "Windows") {
            $cmdPath = Join-Path $env:RUNNER_TEMP "jdtls-ci.cmd"
            @(
              "@echo off",
              "java -Declipse.application=org.eclipse.jdt.ls.core.id1 -Dosgi.bundles.defaultStartLevel=4 -Declipse.product=org.eclipse.jdt.ls.core.product -Dosgi.checkConfiguration=true -Xms1G --add-modules=ALL-SYSTEM --add-opens java.base/java.util=ALL-UNNAMED --add-opens java.base/java.lang=ALL-UNNAMED -jar `"$launcher`" -configuration `"$(Join-Path $installDir $configDir)`" %*"
            ) | Set-Content -LiteralPath $cmdPath -Encoding ASCII
          } else {
            $cmdPath = Join-Path $env:RUNNER_TEMP "jdtls-ci"
            @(
              "#!/usr/bin/env sh",
              "exec java -Declipse.application=org.eclipse.jdt.ls.core.id1 -Dosgi.bundles.defaultStartLevel=4 -Declipse.product=org.eclipse.jdt.ls.core.product -Dosgi.checkConfiguration=true -Xms1G --add-modules=ALL-SYSTEM --add-opens java.base/java.util=ALL-UNNAMED --add-opens java.base/java.lang=ALL-UNNAMED -jar '$launcher' -configuration '$(Join-Path $installDir $configDir)' `"`$@`""
            ) | Set-Content -LiteralPath $cmdPath -Encoding ASCII
            chmod +x $cmdPath
          }
          "JDTLS_CMD=$cmdPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run Gradle tests
        run: gradle test --no-daemon

      - name: Run Neovim adapter tests
        run: nvim --headless -u mcdev-nvim/tests/minimal_init.lua -c "luafile mcdev-nvim/tests/run.lua" -c qa

      - name: Run JDT LS bundle E2E
        shell: pwsh
        run: ./scripts/run-osgi-e2e.ps1

      - name: Check repository layout
        shell: pwsh
        run: ./scripts/check-layout.ps1
